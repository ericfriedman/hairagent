name: HairAgent
options:
  bundleIdPrefix: com.hairagent
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  HairAgent:
    type: application
    platform: iOS
    sources:
      - path: HairAgent
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: com.hairagent.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SUPPORTED_INTERFACE_ORIENTATIONS: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "2"
  HairAgentTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HairAgentTests
    dependencies:
      - target: HairAgent
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_GENERATION_MODE: GeneratedFile
